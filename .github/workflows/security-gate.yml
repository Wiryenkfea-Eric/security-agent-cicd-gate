name: AWS Security Agent --- Security Gate

on:
  pull_request:
    branches: [main, develop, release/*]
    types: [opened, synchronize, reopened]

permissions:
  id-token: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  security-gate:
    name: AWS Security Agent Review
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActions-SecurityGate
          aws-region: us-east-1
          role-session-name: SecurityGate-${{ github.run_id }}

      - name: Trigger AWS Security Agent code review
        id: trigger-review
        run: |
          PR_SHA=${{ github.event.pull_request.head.sha }}
          PR_NUMBER=${{ github.event.pull_request.number }}
          SPACE_ID=${{ secrets.SECURITY_AGENT_SPACE }}

          echo "Triggering Security Agent review for PR #${PR_NUMBER} @ ${PR_SHA}"

          REVIEW_RESPONSE=$(aws securityagent start-review \
            --agent-space-id "${SPACE_ID}" \
            --review-type CODE_REVIEW \
            --code-review-configuration \
            pullRequestId=${PR_NUMBER},commitSha=${PR_SHA} \
            --region us-east-1 \
            --output json)

          REVIEW_ID=$(echo "${REVIEW_RESPONSE}" | jq -r '.reviewId')
          echo "review_id=${REVIEW_ID}" >> $GITHUB_OUTPUT
          echo "Review ID: ${REVIEW_ID}"

      - name: Poll for Security Agent findings
        id: poll-findings
        run: |
          REVIEW_ID=${{ steps.trigger-review.outputs.review_id }}
          SPACE_ID=${{ secrets.SECURITY_AGENT_SPACE }}
          MAX_POLLS=18
          POLL_COUNT=0
          STATUS="IN_PROGRESS"

          echo "Polling for review completion (max 15 min)..."

          while [ "${STATUS}" == "IN_PROGRESS" ] && [ ${POLL_COUNT} -lt ${MAX_POLLS} ]; do
            sleep 50
            POLL_COUNT=$((POLL_COUNT + 1))

            REVIEW=$(aws securityagent get-review \
              --agent-space-id "${SPACE_ID}" \
              --review-id "${REVIEW_ID}" \
              --region us-east-1 \
              --output json)

            STATUS=$(echo "${REVIEW}" | jq -r '.status')
            echo "Poll ${POLL_COUNT}/${MAX_POLLS}: Status = ${STATUS}"
          done

          if [ "${STATUS}" != "COMPLETED" ]; then
            echo "Review timed out or failed. Status: ${STATUS}"
            echo "gate_result=timeout" >> $GITHUB_OUTPUT
            exit 0
          fi

          FINDINGS=$(aws securityagent list-findings \
            --agent-space-id "${SPACE_ID}" \
            --review-id "${REVIEW_ID}" \
            --region us-east-1 \
            --output json)

          CRITICAL=$(echo "${FINDINGS}" | jq '[.findings[] | select(.severity=="CRITICAL")] | length')
          HIGH=$(echo "${FINDINGS}" | jq '[.findings[] | select(.severity=="HIGH")] | length')
          MEDIUM=$(echo "${FINDINGS}" | jq '[.findings[] | select(.severity=="MEDIUM")] | length')
          LOW=$(echo "${FINDINGS}" | jq '[.findings[] | select(.severity=="LOW")] | length')

          echo "Findings --- CRITICAL: ${CRITICAL}, HIGH: ${HIGH}, MEDIUM: ${MEDIUM}, LOW: ${LOW}"
          echo "critical=${CRITICAL}" >> $GITHUB_OUTPUT
          echo "high=${HIGH}" >> $GITHUB_OUTPUT
          echo "medium=${MEDIUM}" >> $GITHUB_OUTPUT
          echo "low=${LOW}" >> $GITHUB_OUTPUT
          echo "findings_json=${FINDINGS}" >> $GITHUB_OUTPUT

          if [ ${CRITICAL} -gt 0 ] || [ ${HIGH} -gt 0 ]; then
            echo "gate_result=fail" >> $GITHUB_OUTPUT
          else
            echo "gate_result=pass" >> $GITHUB_OUTPUT
          fi

      - name: Post security findings as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const critical = '${{ steps.poll-findings.outputs.critical }}' || '0';
            const high = '${{ steps.poll-findings.outputs.high }}' || '0';
            const medium = '${{ steps.poll-findings.outputs.medium }}' || '0';
            const low = '${{ steps.poll-findings.outputs.low }}' || '0';
            const result = '${{ steps.poll-findings.outputs.gate_result }}'
            const icon = result === 'fail' ? ':x:' : ':white_check_mark:'

            const body = [
              `## ${icon} AWS Security Agent --- Security Gate Report`,
              `| Severity | Count | Action |`,
              `|----------|-------|--------|`,
              `| 🔴 Critical | ${critical} | ${critical > 0 ? '**BLOCKS merge**' : 'Clean'} |`,
              `| 🟠 High | ${high} | ${high > 0 ? '**BLOCKS merge**' : 'Clean'} |`,
              `| 🟡 Medium | ${medium} | ${medium > 0 ? 'Jira backlog ticket' : 'Clean'} |`,
              `| 🔵 Low | ${low} | ${low > 0 ? 'Informational' : 'Clean'} |`,
              ``,
              result === 'fail'
                ? '> **This PR is blocked from merging.** Resolve all CRITICAL and HIGH findings and push a new commit.'
                : '> :rocket: All blocking checks passed. PR is cleared by the security gate.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Set gate status and fail build on CRITICAL/HIGH
        run: |
          RESULT=${{ steps.poll-findings.outputs.gate_result }}
          if [ "${RESULT}" == "fail" ]; then
            echo "Security gate FAILED --- CRITICAL or HIGH findings detected"
            exit 1
          fi
          echo "Security gate PASSED"
