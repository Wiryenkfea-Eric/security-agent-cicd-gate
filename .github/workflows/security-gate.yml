name: Security Gate

on:
  pull_request:
    branches: [main]

jobs:
  security-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Scan for vulnerabilities
        id: scan
        run: |
          CRITICAL=0
          HIGH=0
          
          echo "=== Scanning for command injection ==="
          if grep -r "subprocess.*shell=True" . --include="*.py" 2>/dev/null; then
            echo "::error::CRITICAL: Command injection detected (subprocess with shell=True)"
            CRITICAL=$((CRITICAL + 1))
          fi
          
          echo "=== Scanning for SQL injection ==="
          if grep -r 'cursor\.execute(f"' . --include="*.py" 2>/dev/null; then
            echo "::error::CRITICAL: SQL injection detected (f-string in execute)"
            CRITICAL=$((CRITICAL + 1))
          fi
          
          echo "=== Scanning for hardcoded secrets ==="
          if grep -r "AWS_SECRET_KEY" . --include="*.py" 2>/dev/null; then
            echo "::error::HIGH: Hardcoded AWS secret key detected"
            HIGH=$((HIGH + 1))
          fi
          
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          
          if [ $CRITICAL -gt 0 ] || [ $HIGH -gt 0 ]; then
            echo "gate_result=fail" >> $GITHUB_OUTPUT
            echo "VULNERABILITIES FOUND: Critical=$CRITICAL, High=$HIGH"
          else
            echo "gate_result=pass" >> $GITHUB_OUTPUT
            echo "No vulnerabilities found"
          fi
      
      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const critical = '${{ steps.scan.outputs.critical }}';
            const high = '${{ steps.scan.outputs.high }}';
            const result = '${{ steps.scan.outputs.gate_result }}';
            
            let body = `## 🔒 Security Gate Results\n\n`;
            body += `| Severity | Count | Status |\n`;
            body += `|----------|-------|--------|\n`;
            body += `| 🔴 Critical | ${critical} | ${critical > 0 ? '❌ FAIL' : '✅ Pass'} |\n`;
            body += `| 🟠 High | ${high} | ${high > 0 ? '❌ FAIL' : '✅ Pass'} |\n\n`;
            
            if (result === 'fail') {
              body += `### ❌ **This PR is BLOCKED from merging**\n\n`;
              body += `Please fix the vulnerabilities above and push new changes.`;
            } else {
              body += `### ✅ **Security gate passed**\n\n`;
              body += `No critical or high severity vulnerabilities detected.`;
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
      
      - name: Fail build if vulnerabilities found
        if: steps.scan.outputs.gate_result == 'fail'
        run: |
          echo "========================================="
          echo "❌ SECURITY GATE FAILED ❌"
          echo "Critical or high severity vulnerabilities found"
          echo "This PR cannot be merged until fixed"
          echo "========================================="
          exit 1
      
      - name: Success message
        if: steps.scan.outputs.gate_result == 'pass'
        run: |
          echo "========================================="
          echo "✅ SECURITY GATE PASSED ✅"
          echo "No critical vulnerabilities found"
          echo "========================================="
