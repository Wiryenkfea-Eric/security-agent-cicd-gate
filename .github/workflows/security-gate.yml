name: AWS Security Agent --- Security Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  security-gate:
    name: Security Gate - Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for vulnerabilities
        id: scan
        run: |
          CRITICAL=0
          HIGH=0

          echo "Scanning for vulnerabilities..."

          # Check for command injection
          if grep -r "subprocess.*shell=True" . --include="*.py" 2>/dev/null; then
            echo "::warning::CRITICAL: Command injection detected"
            CRITICAL=$((CRITICAL + 1))
          fi

          # Check for SQL injection
          if grep -r "cursor.execute(f" . --include="*.py" 2>/dev/null; then
            echo "::warning::CRITICAL: SQL injection detected"
            CRITICAL=$((CRITICAL + 1))
          fi

          # Check for hardcoded secrets
          if grep -rE "(AWS_SECRET_KEY|SECRET.*=.*['\"]|API_KEY.*=)" . --include="*.py" 2>/dev/null; then
            echo "::warning::HIGH: Hardcoded secret detected"
            HIGH=$((HIGH + 1))
          fi

          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT

          if [ $CRITICAL -gt 0 ] || [ $HIGH -gt 0 ]; then
            echo "gate_result=fail" >> $GITHUB_OUTPUT
          else
            echo "gate_result=pass" >> $GITHUB_OUTPUT
          fi

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const critical = '${{ steps.scan.outputs.critical }}';
            const high = '${{ steps.scan.outputs.high }}';
            const result = '${{ steps.scan.outputs.gate_result }}';

            const body = `## Security Gate Report
            | Severity | Count | Action |
            |----------|-------|--------|
            | 🔴 Critical | ${critical} | ${critical > 0 ? '**BLOCKS merge**' : 'Clean'} |
            | 🟠 High | ${high} | ${high > 0 ? '**BLOCKS merge**' : 'Clean'} |
            
            ${result === 'fail' ? '❌ **This PR is blocked from merging.** Please fix all vulnerabilities.' : '✅ **Security gate passed.**'}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail if vulnerabilities found
        if: steps.scan.outputs.gate_result == 'fail'
        run: |
          echo "❌ Security gate failed!"
          exit 1
